services:
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: gourmet-nginx
    ports:
      - "8080:80"
    depends_on:
      php:
        condition: service_healthy
    networks:
      - gourmet-network

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: gourmet-php
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof php-fpm || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - gourmet-network

  mysql:
    build:
      context: ./docker/mysql
      dockerfile: Dockerfile
    container_name: gourmet-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - gourmet-network

volumes:
  mysql-data:
    driver: local

networks:
  gourmet-network:
    driver: bridge
